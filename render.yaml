services:
  - type: web
    name: jump-slasher
    env: node
    # Один npm install в корне поднимает все workspaces (client/server/shared),
    # build собирает клиент прямо в server/public, сервер раздаёт его оттуда.
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: jump-slasher
          envVarKey: PORT
